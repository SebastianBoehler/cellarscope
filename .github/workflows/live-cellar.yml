name: Live Cellar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Live endpoint tests
        run: npm run test:live
